services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the docker service name instead of localhost
      DATABASE_URL: postgresql+asyncpg://quizine:quizine@db:5432/quizine
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizine
      POSTGRES_PASSWORD: quizine
      POSTGRES_DB: quizine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
